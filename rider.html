<!DOCTYPE html>
<html>
<head>
  <title>Rider</title>
</head>
<body>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  const socket = io("http://localhost:8080", {
    query: {
      userId: "rider_1",
      role: "rider"
    },
    transports: ["websocket"]
  });

  socket.on("connect", () => {
    console.log("🚴 Rider Connected");

    setInterval(() => {
      socket.emit("update_location", {
        orderId: "ORDER_1",
        lat: 23.2599,
        lng: 77.4126
      });
    }, 6000);
  });
</script>

</body>
</html>
